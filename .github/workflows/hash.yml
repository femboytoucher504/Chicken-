name: Auto Update Plugin Hash

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  hash-generator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Calculate and Force Inject Hash
        run: |
          CALC_HASH=$(sha256sum index.js | awk '{print $1}')
          echo "Generated SHA-256: $CALC_HASH"
          
          # Using environment variables to keep Python immune to shell quote breaking
          export CALC_HASH
          
          python3 -c '
          import os, re
          target_hash = os.environ.get("CALC_HASH")
          
          with open("manifest.json", "r", encoding="utf-8") as f:
              content = f.read()
          
          # Forcefully overwrites any hash strings regardless of JSON formatting quirks
          updated_content = re.sub(r"\"hash\"\s*:\s*\"[^\"]*\"", f"\"hash\": \"{target_hash}\"", content)
          
          with open("manifest.json", "w", encoding="utf-8") as f:
              f.write(updated_content)
          '

      - name: Commit Updated Hash Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated manifest hash updates"
          
